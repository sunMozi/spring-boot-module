<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上传文件</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
<div class="bg-white rounded-lg shadow-md p-8 w-full max-w-md">
  <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">用户信息提交</h1>

  <form action="/upload" method="post" enctype="multipart/form-data" class="space-y-6">
    <!-- 姓名 -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">姓名</label>
      <input
          type="text"
          name="username"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
          placeholder="请输入您的姓名"
      >
    </div>

    <!-- 年龄 -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">年龄</label>
      <input
          type="number"
          name="age"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
          placeholder="请输入您的年龄"
      >
    </div>

    <!-- 头像上传 -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">头像</label>
      <div class="flex items-center justify-center w-full">
        <label class="flex flex-col items-center px-4 py-6 bg-white text-blue-500 rounded-lg border-2 border-dashed border-blue-500 cursor-pointer hover:bg-blue-50 transition">
          <svg class="w-8 h-8 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
          </svg>
          <span class="text-sm">点击上传文件</span>
          <input type="file" name="file" class="hidden">
        </label>
      </div>
    </div>

    <!-- 提交按钮 -->
    <button
        type="submit"
        class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition-colors font-medium focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
    >
      提交信息
    </button>
  </form>
</div>
</body>
</html>
