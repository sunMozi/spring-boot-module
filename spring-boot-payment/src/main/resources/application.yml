server:
  port: 8080
  servlet:
    context-path: /

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/payment?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update # \u5F00\u53D1\u9636\u6BB5\u5EFA\u8BAE\u7528 update\uFF0C\u751F\u4EA7\u63A8\u8350 validate \u6216 none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

pay:
  alipay:
    app-id: your-alipay-app-id
    private-key: your-private-key
    public-key: your-alipay-public-key
    gateway-url: https://openapi.alipay.com/gateway.do
    notify-url: https://yourdomain.com/api/pay/alipay/notify
  wechat:
    mch-id: your-mch-id
    mch-key: your-mch-key
    app-id: your-app-id
    notify-url: https://yourdomain.com/api/pay/wechat/notify



